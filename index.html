<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Goldpreis (USD)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 215, 0, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --gold-gradient: linear-gradient(135deg, #FFD700 0%, #FDB931 50%, #FFDF00 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 215, 0, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(253, 185, 49, 0.04) 0%, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            text-align: center;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3rem 2rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 215, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), transparent);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 215, 0, 0.05);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 42, 42, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #ff4d4d;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #ff4d4d;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #ff4d4d;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7); }
            70% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 6px rgba(255, 77, 77, 0); }
            100% { transform: scale(0.95); opacity: 0.7; box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); }
        }

        .title {
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .price-container {
            margin: 1.5rem 0;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: baseline;
        }

        .price {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            transition: all 0.3s ease;
        }

        .price.updating {
            opacity: 0.5;
            transform: scale(0.98);
        }

        .currency {
            font-size: 1.5rem;
            font-weight: 600;
            color: #FFD700;
            margin-left: 8px;
            opacity: 0.8;
        }

        .metadata {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .update-time {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .error-message {
            color: #ff4d4d;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 215, 0, 0.1);
            border-left-color: #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }

        .loading .spinner {
            display: block;
        }
        .loading .price {
            opacity: 0;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Micro-animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card" id="gold-card">
            <div class="header">
                <div class="live-indicator">
                    <span class="dot"></span> Live
                </div>
            </div>
            
            <h1 class="title">Goldpreis pro Unze</h1>
            
            <div class="price-container" id="price-container">
                <div class="spinner" id="spinner"></div>
                <div class="price" id="price-value">----.--</div>
                <div class="currency">USD</div>
            </div>
            
            <div class="metadata">
                <div class="update-time" id="last-updated">Wird geladen...</div>
            </div>

            <div class="error-message" id="error-message">
                Fehler beim Laden der Daten. Versuche es erneut...
            </div>
        </div>
    </div>

    <script>
        const priceElement = document.getElementById('price-value');
        const timeElement = document.getElementById('last-updated');
        const errorElement = document.getElementById('error-message');
        const cardElement = document.getElementById('gold-card');
        const priceContainer = document.getElementById('price-container');

        // Formatter für US Dollar
        const formatter = new Intl.NumberFormat('en-US', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });

        async function fetchGoldPrice() {
            try {
                // UI States: set updating class for subtle animation
                if (priceElement.innerText !== '----.--') {
                    priceElement.classList.add('updating');
                } else {
                    priceContainer.classList.add('loading');
                }
                
                errorElement.style.display = 'none';

                // API Aufruf - Freie API ohne Key Anforderungen
                const response = await fetch('https://api.gold-api.com/price/XAU');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Preis updaten
                const formattedPrice = formatter.format(data.price);
                priceElement.textContent = formattedPrice;
                
                // Zeitstempel updaten
                const updateDate = new Date();
                const timeString = updateDate.toLocaleTimeString('de-DE', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
                
                timeElement.textContent = `Zuletzt aktualisiert: Heute, ${timeString}`;
                
            } catch (error) {
                console.error('Fehler beim Abrufen des Goldpreises:', error);
                
                if (priceElement.innerText === '----.--') {
                    errorElement.style.display = 'block';
                    timeElement.textContent = 'Aktualisierung fehlgeschlagen';
                }
            } finally {
                // UI States zurücksetzen
                priceElement.classList.remove('updating');
                priceContainer.classList.remove('loading');
            }
        }

        // Initiales Laden
        fetchGoldPrice();

        // Alle 15 Sekunden aktualisieren
        // Das Intervall sorgt für die Live-Updates solange der Tab offen ist
        setInterval(fetchGoldPrice, 15000);
    </script>
</body>
</html>
